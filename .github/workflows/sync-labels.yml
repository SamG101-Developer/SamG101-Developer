name: Sync Labels

on:
  push:
    branches: [ main ]
    paths:
      - .github/labels.yml
      - .github/sync-repos.yml
      - .github/workflows/sync-labels.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      OWNER: SamG101-Developer
      GH_TOKEN: ${{ secrets.LABEL_SYNC_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install -g github-label-sync@2

      - name: Sync Labels
        run: |
          set -euo pipefail
          repos=$(yq -r '.[]' .github/sync-repos.yml \
            | sed '/^\s*$/d' \
            | awk -v owner="$OWNER" '{ print ($0 ~ /\//) ? $0 : owner "/" $0 }')

          if [ -z "$repos" ]; then
            echo "No repositories listed in .github/sync-repos.yml" >&2
            exit 1
          fi

          failed=""
          for repo in $repos; do
            echo "::group::Syncing $repo"
            if github-label-sync \
                 --access-token "$GH_TOKEN" \
                 --labels .github/labels.yml \
                 --allow-added-labels \
                 "$repo"; then
              echo "OK: $repo"
            else
              echo "FAILED: $repo"
              failed="$failed $repo"
            fi
            echo "::endgroup::"
          done

          if [ -n "$failed" ]; then
            echo "::error::Label sync failed for:$failed"
            exit 1
          fi
